<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <!-- CSS File Link -->
    <link rel="stylesheet" href="RPS.CSS">
</head>
<body>

    <h1>Rock Paper Scissors game by the shuaibrai</h1>

    <!-- Choices Section -->
    <div class="choices">

        <div class="choice" id="rock">
            <img src="https://chauhan-hardik.github.io/Rock-Paper-Scissors/images/rock.png" alt="Rock">
        </div>

        <div class="choice" id="paper">
            <img src="https://abdeali7.github.io/Rock-Paper-Scissors/images/paper.png" alt="Paper">
        </div>

        <div class="choice" id="scissors">
            <img src="https://sizimon.github.io/P2/assets/images/scissors.png" alt="Scissors">
        </div>

    </div>

    <!-- Score Board -->
    <div class="score-board">

        <div class="score">
            <p>You</p>
            <p id="user-score">0</p>
        </div>

        <div class="score">
            <p>Computer</p>
            <p id="comp-score">0</p>
        </div>

    </div>

    <!-- Message -->
    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>

    <!-- Refresh Button -->
<div class="refresh-container">
    <button id="refresh-btn">Restart Game</button>
</div>

    <!-- JavaScript File Link -->
    <script src="RPS.JS"></script>

</body>
</html>
